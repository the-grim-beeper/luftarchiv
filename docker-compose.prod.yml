services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: luftarchiv
      POSTGRES_USER: luftarchiv
      POSTGRES_PASSWORD: ${DB_PASSWORD:-luftarchiv_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luftarchiv"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://luftarchiv:${DB_PASSWORD:-luftarchiv_dev}@db:5432/luftarchiv
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      IMAGE_STORAGE_PATH: /app/data/images
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Mount a local folder for scan imports (optional)
      # On Windows: change the left side to your scans folder
      # Example: C:\Users\you\Desktop\scans:/scans
      - ${SCANS_PATH:-./scans}:/scans
      - appdata:/app/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  appdata:
