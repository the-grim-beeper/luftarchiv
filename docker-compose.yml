services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: luftarchiv
      POSTGRES_USER: luftarchiv
      POSTGRES_PASSWORD: luftarchiv_dev
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db-init:/docker-entrypoint-initdb.d

volumes:
  pgdata:
